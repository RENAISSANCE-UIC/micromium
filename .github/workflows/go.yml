name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Create stub frontend/dist for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/placeholder
      - name: Go build
        run: go build ./cmd/micromium/...
      - name: Go tests
        run: go test ./bio/... ./app/... ./server/...

  build-frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Build renderer
        working-directory: frontend
        run: npm run build:renderer
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build Go backend for Windows
        run: go build -o micromiumserver.exe ./cmd/micromium/...
      - name: Build Electron main process
        working-directory: frontend
        run: npm run build:electron
      - name: Package with electron-builder
        working-directory: frontend
        run: npx electron-builder --windows nsis --x64
        env:
          NODE_ENV: production
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: micromium-windows-installer
          path: frontend/dist-electron/*.exe
